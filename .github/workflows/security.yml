name: Security Audit
on: [push, pull_request]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go Engine
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Execute Govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
